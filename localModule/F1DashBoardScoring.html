<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 Ultimate Dynamic Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #eee; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #e10600; text-transform: uppercase; margin-bottom: 5px;}
        .status-bar { margin-bottom: 20px; font-size: 0.8rem; color: #00ff41; font-family: monospace; height: 1.2rem; }
        .controls { display: flex; gap: 10px; margin-bottom: 25px; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        select { padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer; min-width: 200px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; }
        .box { background: #161616; border-left: 4px solid #444; padding: 15px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .box.highlight { border-left-color: #e10600; background: #1c1313; }
        .box h3 { margin: 0 0 10px 0; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .entry { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid #222; }
        .pos { font-weight: bold; color: #e10600; min-width: 30px; }
        .driver-name { font-weight: 600; font-size: 0.95rem; }
        .team-name { font-size: 0.7rem; color: #aaaaaa; text-transform: uppercase; display: block; }
        .meta-section { margin-top: 12px; padding-top: 10px; border-top: 1px dashed #333; font-size: 0.85rem; }
        .meta-item { margin-bottom: 4px; color: #bbb; }
        .meta-item.link a { color: #00ff41; text-decoration: none; }
        .loading { font-style: italic; color: #e9e9e9; }
        .predictions-container { width: 100%; max-width: 1200px; margin-top: 30px; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #e10600; }
        .prediction-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(max(200px, 100%/3), 2fr)); gap: 15px; margin-top: 15px; }
        .player-card { background: #252525; padding: 15px; border-radius: 4px; border: 1px solid #333; }
        .player-card h4 { margin: 0 0 10px 0; color: #e10600; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .pred-input { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .pred-input label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .pred-input select { min-width: auto; width: 100%; padding: 5px; font-size: 0.85rem; }
        .action-btns { margin-top: 20px; display: flex; gap: 10px; border-top: 1px solid #333; padding-top: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-save { background: #e10600; color: white; }
        .btn-load { background: #444; color: white; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <h1>F1 Dashboard 2026 </h1>
    <div id="status" class="status-bar">> Initializing 2026 Calendar...</div>

    <div class="controls">
        <select id="gp-select" onchange="loadSessions()">
            <option>Loading Calendar...</option>
        </select>
    </div>

    <div id="board" class="grid"></div>


    <div class="predictions-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Prediction Sheet</h3>
            <div id="score-summary" style="color: #00ff41; font-weight: bold; font-family: monospace;"></div>
        </div>

        <div id="prediction-grid" class="prediction-grid">
        </div>

        <div class="action-btns">
            <button class="btn btn-save" onclick="savePredictions()">Save JSON</button>
            <button class="btn btn-load" onclick="document.getElementById('file-input').click()">Load JSON</button>
            <button class="btn btn-load" style="background: #00ff41; color: #000;"
                onclick="calculateAllScores()">Calculate Scores</button>
            <input type="file" id="file-input" accept=".json" onchange="loadPredictions(event)">
        </div>
    </div>

    <div class="disclaimer" style="margin-top: 30px; font-size: 1rem; color: #555; max-width: 1000px; text-align: center;">
        Data sourced from <a href="https://openf1.org" style="color: #00ff41;">OpenF1 API</a>.
        Since the API has a timeout, data may take a few seconds to load after selecting a Grand Prix.
    </div>

    <script>
        const API_BASE = "https://api.openf1.org/v1";
        const DELAY = 1000;
        let queue = [];
        let isWorking = false;
        const driverRegistry = {};
        let metadata = {
            meeting_key: null,
            session_key: null,
            date: null
        };

        const updateStatus = (msg) => document.getElementById('status').innerText = `> ${msg}`;
        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        // ... existing variables ...
        const players = ["Bernadett", "Csenge", "Gábor", "Marci", "Vencel", "Zsombor"];

        // NEW: Initialize Prediction UI    
        function initPredictionUI() {
            const grid = document.getElementById('prediction-grid');
            grid.innerHTML = players.map((player, idx) => `
        <div class="player-card" data-player="${idx}">
            <h4>${player}</h4>
            <div class="pred-input">
                <label>Race P1</label>
                <select class="p1-select"><option value="">Select Driver...</option></select>
            </div>
            <div class="pred-input">
                <label>Race P2</label>
                <select class="p2-select"><option value="">Select Driver...</option></select>
            </div>
            <div class="pred-input">
                <label>Race P3</label>
                <select class="p3-select"><option value="">Select Driver...</option></select>
            </div>
            <div class="pred-input">
                <label>Total DNFs</label>
                <select class="dnf-select">
                    ${[...Array(21).keys()].map(n => `<option value="${n}">${n}</option>`).join('')}
                </select>
            </div>
        </div>
    `).join('');
        }

        // NEW: Update dropdowns when driver data arrives
        function updateDriverDropdowns(drivers) {
            const selects = document.querySelectorAll('.p1-select, .p2-select, .p3-select');
            const options = Object.entries(drivers)
                .sort((a, b) => a[1].name.localeCompare(b[1].name))
                .map(([num, info]) => `<option value="${num}">${info.name} (${info.team})</option>`)
                .join('');

            selects.forEach(s => {
                const currentVal = s.value;
                s.innerHTML = `<option value="">Select Driver...</option>` + options;
                s.value = currentVal;
            });
        }

        // NEW: Save to JSON
        function savePredictions() {
            const data = [];
            document.querySelectorAll('.player-card').forEach(card => {
                data.push({
                    player: card.querySelector('h4').innerText,
                    p1: card.querySelector('.p1-select').value,
                    p2: card.querySelector('.p2-select').value,
                    p3: card.querySelector('.p3-select').value,
                    dnf: card.querySelector('.dnf-select').value
                });
            });

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `f1-2026-predictions-${document.getElementById('gp-select').value}.json`;
            a.click();
        }

        // NEW: Load from JSON
        function loadPredictions(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                const data = JSON.parse(e.target.result);
                data.forEach((pred, idx) => {
                    const card = document.querySelector(`.player-card[data-player="${idx}"]`);
                    if (card) {
                        card.querySelector('.p1-select').value = pred.p1;
                        card.querySelector('.p2-select').value = pred.p2;
                        card.querySelector('.p3-select').value = pred.p3;
                        card.querySelector('.dnf-select').value = pred.dnf;
                    }
                });
                updateStatus("Predictions Loaded Successfully.");
            };
            reader.readAsText(file);
        }

        // Modify your existing getDriverMap to trigger the dropdown update
        async function getDriverMap(sKey) {
            if (driverRegistry[sKey]) {
                updateDriverDropdowns(driverRegistry[sKey]); // Update UI
                return driverRegistry[sKey];
            }
            const res = await fetch(`${API_BASE}/drivers?session_key=${sKey}`);
            const data = await res.json();
            const map = {};
            data.forEach(d => { map[d.driver_number] = { name: d.full_name, team: d.team_name }; });
            driverRegistry[sKey] = map;
            updateDriverDropdowns(map); // Update UI
            return map;
        }

        // 1. Fetch the 2026 Calendar on load
        async function initCalendar() {
            try {
                const res = await fetch(`${API_BASE}/meetings?year=2026`);
                const meetings = await res.json();
                // slice to skip first 2 meetings which are WEC tests and not actual GPs
                meetings.splice(0, 2);
                console.log("Calendar data:", meetings);
                const select = document.getElementById('gp-select');
                select.innerHTML = meetings.map(m =>
                    `<option value="${m.meeting_key}">${m.meeting_name}</option>`
                ).join('');
                updateStatus("Calendar Loaded. Select a Grand Prix.");
                loadSessions();
            } catch (e) { updateStatus("Error loading calendar."); }
        }

        // Modify your existing getDriverMap to trigger the dropdown update
        async function getDriverMap(sKey) {
            if (driverRegistry[sKey]) {
                updateDriverDropdowns(driverRegistry[sKey]); // Update UI
                return driverRegistry[sKey];
            }
            const res = await fetch(`${API_BASE}/drivers?session_key=${sKey}`);
            const data = await res.json();
            const map = {};
            data.forEach(d => { map[d.driver_number] = { name: d.full_name, team: d.team_name }; });
            driverRegistry[sKey] = map;
            updateDriverDropdowns(map); // Update UI
            return map;
        }

        async function fetchRetirements(sessionKey) {
            try {
                const response = await fetch(`${API_BASE}/session_result?session_key=${sessionKey}`);
                const results = await response.json();

                const dnfs = results.filter(driver => driver.dnf === true);
                const dns = results.filter(driver => driver.dns === true);

                return {
                    dnfCount: dnfs.length,
                    dnsCount: dns.length,
                };
            } catch (error) {
                console.error("Error fetching retirement data:", error);
                return { dnfCount: 0, dnsCount: 0 };
            }
        }

        function calculateAllScores() {
            // 1. Get Actual Results from the Race Box

            const raceBox = document.getElementById("race-box");
            const actualP1 = raceBox.querySelector('.entry:nth-child(1) .driver-name')?.innerText;
            const actualP2 = raceBox.querySelector('.entry:nth-child(2) .driver-name')?.innerText;
            const actualP3 = raceBox.querySelector('.entry:nth-child(3) .driver-name')?.innerText;

            // Extract DNF count from the meta-section text
            const dnfText = raceBox.querySelector('.meta-section')?.innerText || "";
            const actualDNF = parseInt(dnfText.match(/DNFs:\s*(\d+)/)?.[1] || 0);

            const podium = [actualP1, actualP2, actualP3];

            // 2. Score each player
            document.querySelectorAll('.player-card').forEach(card => {
                let score = 0;
                const pP1 = card.querySelector('.p1-select option:checked').text.split(' (')[0];
                const pP2 = card.querySelector('.p2-select option:checked').text.split(' (')[0];
                const pP3 = card.querySelector('.p3-select option:checked').text.split(' (')[0];
                const pDNF = parseInt(card.querySelector('.dnf-select').value);

                const guesses = [pP1, pP2, pP3];
                //console.log(`Scoring ${card.querySelector('h4').innerText}: Guesses: ${guesses.join(', ')} | Actual: ${podium.join(', ')} | DNF Guess: ${pDNF} | Actual DNF: ${actualDNF}`);

                // Position Scoring
                guesses.forEach((guess, idx) => {
                    if (guess === podium[idx]) {
                        score += 1; // Exact match
                    }
                });

                // DNF Scoring
                if (pDNF == actualDNF) score += 1;

                // Display individual score
                let badge = card.querySelector('.score-badge');
                if (!badge) {
                    badge = document.createElement('div');
                    badge.className = 'score-badge';
                    badge.style = "margin-top:10px; color:#00ff41; font-size:1.2rem; font-weight:bold;";
                    card.appendChild(badge);
                }
                badge.innerText = `SCORE: ${score} PTS`;
            });

            updateStatus("Scores Calculated!");
        }

        async function processQueue() {
            if (isWorking || queue.length === 0) return;
            isWorking = true;
            const bestThreeTeams = ['Ferrari', 'Red Bull Racing', 'Mercedes'];

            while (queue.length > 0) {
                const job = queue.shift();
                updateStatus(`Fetching: ${job.label}...`);

                try {
                    const drivers = await getDriverMap(job.sKey);
                    await wait(DELAY);

                    // Fetch Positions
                    const posRes = await fetch(`${API_BASE}/position?session_key=${job.sKey}&position<=${job.n}`);
                    const posData = await posRes.json();

                    function getLatestTop3(data) {
                        const latestEntries = {};

                        data.forEach(entry => {
                            const pos = entry.position;

                            // Filter for only Top 3
                            if ([1, 2, 3].includes(pos)) {
                                const currentDate = entry.date;

                                // If position isn't tracked yet, or this entry is newer than the stored one
                                if (!latestEntries[pos] || currentDate > latestEntries[pos].date) {
                                    latestEntries[pos] = entry;
                                }
                            }
                        });

                        // Extract values, sort by position key (1, 2, 3), and return as array
                        return Object.keys(latestEntries)
                            .sort((a, b) => a - b)
                            .map(p => latestEntries[p]);
                    }

                    const results = getLatestTop3(posData);

                    let html = results.map(r => {
                        const info = drivers[r.driver_number] || { name: `Driver #${r.driver_number}`, team: "Unknown" };
                        return `<div class="entry"><span class="pos">P${r.position}</span><div><span class="driver-name">${info.name}</span><span class="team-name">${info.team}</span></div></div>`;
                    }).join('');

                    if (job.isRace) {
                        // For Race, fetch fastest lap (Logic: query laps session and sort by duration)
                        await wait(DELAY);
                        const lapRes = await fetch(`${API_BASE}/laps?session_key=${job.sKey}`);
                        const lapData = await lapRes.json();
                        const validLaps = lapData.filter(l => l.lap_duration !== null);
                        const fastest = validLaps.reduce((fast, current) => {
                            return (current.lap_duration < fast.lap_duration) ? current : fast;
                        }, validLaps[0]);
                        const fastDriver = drivers[fastest?.driver_number]?.name || "N/A";
                        const dnfData = await fetchRetirements(job.sKey);

                        const botrLap = validLaps
                            .filter(l => {
                                const team = drivers[l.driver_number]?.team || "";
                                return !bestThreeTeams.includes(team);
                            })
                            .reduce((best, current) => {
                                return (current.lap_duration < best.lap_duration) ? current : best;
                            }, validLaps[0]);
                        const botrDriver = drivers[botrLap?.driver_number]?.name || "N/A";

                        html += `
                            <div class="meta-section">
                                <div class="meta-item"><strong>Fastest Lap:</strong> ${fastDriver} (${fastest?.lap_duration || '--'})</div>
                                <div class="meta-item"><strong>BOTR:</strong> ${botrDriver} (${botrLap?.lap_duration || '--'}) </div>
                                <div class="meta-item"><strong>DNFs:</strong> ${dnfData.dnfCount + dnfData.dnsCount}  </div>
                                <div class="meta-item link"><strong>Driver of the Day:</strong><a href="https://www.formula1.com/en/results/2026/awards/driver-of-the-day#:~:text=THE%20DAY%20RESULTS-,Grand%20Prix,-Winner"> Link </a></div>
                            </div>`;
                    }
                    else if (job.isQualy) {
                        await wait(DELAY);
                        const lapRes = await fetch(`${API_BASE}/laps?session_key=${job.sKey}`);
                        const lapData = await lapRes.json();
                        const validLaps = lapData.filter(l => l.lap_duration !== null);
                        const botrLap = validLaps
                            .filter(l => {
                                const team = drivers[l.driver_number]?.team || "";
                                return !bestThreeTeams.includes(team);
                            })
                            .reduce((best, current) => {
                                return (current.lap_duration < best.lap_duration) ? current : best;
                            }, validLaps[0]);
                        const botrDriver = drivers[botrLap?.driver_number]?.name || "N/A";
                        html += `
                            <div class="meta-section">
                                <div class="meta-item"><strong>BOTR:</strong> ${botrDriver} (${botrLap?.lap_duration || '--'}) </div>
                            </div>`;
                    }

                    document.getElementById(job.id).innerHTML = html || "No Results";
                } catch (e) { document.getElementById(job.id).innerHTML = "Error"; console.error(`Error processing ${job.label}:`, e); }

                if (queue.length > 0) await wait(DELAY);
            }
            updateStatus("All Data Loaded.");
            isWorking = false;
        }

        async function loadSessions() {
            const mKey = document.getElementById('gp-select').value;
            const board = document.getElementById('board');
            board.innerHTML = '';
            queue = [];

            updateStatus("Finding sessions for GP...");
            const sRes = await fetch(`${API_BASE}/sessions?meeting_key=${mKey}`);
            const sessions = await sRes.json();
            metadata.meeting_key = mKey;
            metadata.date = sessions[-1]?.date || null;
            metadata.session_key = sessions[-1]?.session_key || null;

            sessions.forEach(s => {
                const name = s.session_name;
                const id = `s-${s.session_key}`;
                const isRace = name.toLowerCase().includes('race');
                const isQualy = name.toLowerCase().includes('qualifying');

                board.innerHTML += `
                    <div class="box" ${isRace ? 'id="race-box"' : ''}>
                        <h3>${name}</h3>
                        <div id="${id}" class="loading">Queued...</div>
                    </div>`;
                    // <div class="box ${isRace ? 'highlight' : ''}">

                queue.push({
                    sKey: s.session_key,
                    id,
                    label: name,
                    n: (isRace || isQualy) ? 3 : 1,
                    isRace: isRace,
                    isQualy: isQualy
                });
            });
            processQueue();
        }

        // Call init on load
        initPredictionUI();
        initCalendar();
    </script>

</body>

</html>
